# 1. Hook &amp; Activation
### The Logic of Difference‑in‑Differences

---
### The Canonical DiD Example: Card and Krueger (1994)

- **Question**: Does raising the minimum wage reduce employment?
- **Setting**: New Jersey raised minimum wage; Pennsylvania did not.
- **Data**: Fast food restaurants in both states, before and after the policy.

---
### The Canonical DiD Example: Card and Krueger (1994)



``` r
library(dplyr)
library(tidyr)
library(knitr)
library(kableExtra)

data_path &lt;- file.path("data", "CK1994.csv")
ck &lt;- read.csv(data_path, na.strings = c(".", ""))   # missing values are coded as "."

ck &lt;- ck %&gt;%
  mutate(
    total_emp = empft + emppt + nmgrs,
    # Label groups
    state_name = ifelse(state == 1, "New Jersey (treated)", "Pennsylvania (control)"),
    period = ifelse(time == 0, "Before", "After")
  )
```

---


``` r
# Keep only complete cases for the three employment components
ck_clean &lt;- ck %&gt;%
  filter(!is.na(empft) &amp; !is.na(emppt) &amp; !is.na(nmgrs))

# Calculate mean employment by state and period
means &lt;- ck_clean %&gt;%
  group_by(state_name, period) %&gt;%
  summarise(mean_emp = mean(total_emp, na.rm = TRUE), .groups = "drop")

# Pivot to wide format for easy differencing
means_wide &lt;- means %&gt;%
  pivot_wider(names_from = period, values_from = mean_emp)
```

---


``` r
# Compute differences (After - Before)
means_wide &lt;- means_wide %&gt;%
  mutate(Difference = After - Before)

# Extract DiD estimate
did_estimate &lt;- means_wide$Difference[means_wide$state_name == "New Jersey (treated)"] -
                means_wide$Difference[means_wide$state_name == "Pennsylvania (control)"]

# Create a clean presentation table

table_did &lt;- means_wide %&gt;%
  select(state_name, Before, After, Difference) %&gt;%
  rename(State = state_name)

# Add a row for the DiD estimate
table_did &lt;- bind_rows(
  table_did,
  tibble(
    State = "Difference-in-Differences",
    Before = NA,
    After = NA,
    Difference = did_estimate
  )
)
```

---


``` r
# Format numbers (round to one decimal)
table_did &lt;- table_did %&gt;%
  mutate(
    Before = round(Before, 1),
    After = round(After, 1),
    Difference = round(Difference, 1)
  )
```

### The Canonical DiD Example: Card and Krueger (1994)

- Result: Employment **increased** in NJ relative to PA – contrary to traditional economic theory.
- Sparked decades of debate about the parallel trends assumption.

## The Regression Equation

We can also estimate this using a regression model, which makes it easy to add controls and get standard errors.

`$$Y_{it} = \beta_0 + \beta_1 \text{Treat}_i + \beta_2 \text{Post}_t + \beta_3 (\text{Treat}_i \times \text{Post}_t) + \epsilon_{it}$$`

Where:
*   `\(Y_{it}\)` is the outcome for unit *i* at time *t*.
*   `\(\text{Treat}_i\)` is a dummy variable = 1 for the treated group, 0 otherwise.
*   `\(\text{Post}_t\)` is a dummy variable = 1 for the post-treatment period, 0 otherwise.
*   `\(\text{Treat}_i \times \text{Post}_t\)` is the **interaction term**. Its coefficient `\(\beta_3\)` is our **DiD estimate**.

---


``` r
did_lm &lt;- lm(total_emp ~ state + time + state:time, data=ck_clean)
table &lt;- modelsummary(did_lm, stars = TRUE, output="kableExtra")
```

## The Key Assumption: Parallel Trends

The validity of DiD rests on the **parallel trends assumption**:

&gt; In the absence of the treatment, the average outcome for the treated group would have changed by the same amount as the average outcome for the control group.

**Crucially, we cannot directly test this assumption because we never observe the counterfactual.** However, we can provide supporting evidence by:
1.  Plotting the pre-treatment trends to see if they are parallel.
2.  Running a "placebo" DiD on a period where we *know* there was no treatment.
3.  Using an alternative control group.

# 2. Your Turn: Core Activity
### Does Transitioning to Democracy Increase the Chance of Military Conflict?

---

## The Research Question

The "democratic peace" theory suggests that democracies are less likely to fight each other. But what about the process of *becoming* a democracy? Some scholars argue that the transition period itself is dangerous and can increase the risk of international conflict.

**Your task:** Design and run a difference‑in‑differences analysis to test the hypothesis that democratization increases a country's probability of initiating or joining a militarized interstate dispute (MID).

---

## Getting Set Up in R

We'll use the `peacesciencer` package to easily access and merge data on regime type (from Polity IV) and conflict (from the Correlates of War project).


``` r
# Run this in your console to install the package
# install.packages("peacesciencer")
```


``` r
# Load the package
library(peacesciencer)

# We'll also load the tidyverse for data wrangling
library(tidyverse)
```

---

## Building Our Dataset (1/3)

We will create a state‑year panel dataset from 1945 to 2010. We'll define a **democratization event** as a large, positive change in a country's Polity IV score (which ranges from -10 for full autocracy to +10 for full democracy).


``` r
# 1. Create a base state-year data frame and add conflict data right away
base_data &lt;- create_stateyears(system = "cow", subset_years = 1945:2010) %&gt;%
  filter(!is.na(ccode)) %&gt;%
  # Add state-year conflict onset (Gibler-Miller-Little MID data)
  add_gml_mids(keep = c("gmlmidonset")) %&gt;%
  # Create a clean conflict onset binary variable
  mutate(conflict = if_else(!is.na(gmlmidonset), gmlmidonset, 0))

# 2. Add democracy scores (Polity IV)
data_with_polity &lt;- base_data %&gt;%
  add_democracy()
```

---

## Building Our Dataset (2/3)


``` r
# 3. Create a measure of democratization
# We'll define a "democratization event" as an increase of 5+ points over 5 years
data_with_treat &lt;- data_with_polity %&gt;%
  group_by(ccode) %&gt;%
  arrange(year) %&gt;%
  mutate(
    polity_change_5yr = polity2 - lag(polity2, 5),  # Change over last 5 years
    # Treatment occurs in the year the 5-year change is &gt;= 5
    treat_year = if_else(polity_change_5yr &gt;= 5 &amp; !is.na(polity_change_5yr), year, NA_real_),
    # We'll treat a country as "ever treated" if it has a treatment year
    ever_treated = any(!is.na(treat_year))
  ) %&gt;%
  ungroup()
```

## Defining Treatment and Control Groups

*   **Treated Group:** Countries that experienced a democratization event (our defined 5+ point increase in Polity score) at some point in the sample period.
*   **Control Group:** Countries that *never* experienced such an event during the sample period.
*   **Treatment Timing:** We'll consider a country "treated" in the year the event happened and all subsequent years.

We need to create the necessary `treat`, `post`, and `treat_post` variables for our regression.

---

## Building Our Dataset (3/3)


``` r
# Create final analysis dataset with DiD variables
did_data_clean &lt;- data_with_treat %&gt;%
  group_by(ccode) %&gt;%
  mutate(
    # For now, just use the first democratization event for each country
    first_treat_year = if_else(any(!is.na(treat_year)), min(treat_year, na.rm = TRUE), NA_real_),
    # Define the DiD dummies
    treat_group = if_else(!is.na(first_treat_year), 1, 0),
    post_period = if_else(!is.na(first_treat_year) &amp; year &gt;= first_treat_year, 1, 0),
    treat_post = treat_group * post_period
  ) %&gt;%
  ungroup() %&gt;%
  # Keep only the variables we need for analysis
  select(ccode, year, conflict, polity2, treat_group, post_period, treat_post, first_treat_year) %&gt;%
  # Ensure we have no missing values for our main variables
  filter(!is.na(treat_group) &amp; !is.na(post_period))
```

## Run the DiD Regression

Now we can estimate the DiD model using a Two‑Way Fixed Effects (TWFE) model.


``` r
# Two-Way Fixed Effects 
# This controls for all time-invariant country characteristics and common year shocks.
# Fill in relevant variable names yourself to produce your own DiD!
model_twfe &lt;- feols(OUTCOME VARIABLE ~ TREATMENT VARIABLE | UNIT VARIABLE + TIME VARIABLE, data = did_data_clean, cluster = ~ccode)
summary(model_twfe)
```

---

## Interpreting the Results

The coefficient on `treat_post` (or the `treat_post` variable in the TWFE model) is your DiD estimate.

*   **What is the sign and magnitude of the coefficient?**
*   **Is it statistically significant?**
*   **How would you interpret this substantively?** For example: "The transition to democracy is associated with a X percentage-point change in the probability of initiating a conflict."

---

## Checkpoint: Does Our Design Make Sense?

Now that we've made sense of the results, consider:

*   **Parallel Trends:** Do the treated and control countries have similar trends in conflict before the democratization events? (We'll test this visually in a bit.)
*   **Stable Unit Treatment Value Assumption (SUTVA):** Does the democratization of one country affect the conflict propensity of other countries? (Spillover is a major threat here.)
*   **Reverse Causality:** Could it be that conflict causes democratization, rather than the other way around? (Our simple DiD design doesn't solve this.)

# 3. Diagnostics &amp; Assumptions
### Event Studies and the Bacon Decomposition

---

## Visualizing Parallel Trends: The Event Study Plot

An event study is the best way to visually assess the parallel trends assumption. It plots the treatment effect in "event time" — years before and after the democratization event.

We can create one by interacting our treatment indicator with dummies for years relative to the event.


``` r
# Create a relative time variable centered on the first treatment year
did_data_event &lt;- did_data_clean %&gt;%
  mutate(time_to_treat = year - first_treat_year) %&gt;%
  # Keep only treated countries and those with a clear event year
  filter(!is.na(first_treat_year) | treat_group == 0)

# For control units, we can set a dummy time variable (e.g., -1000)
did_data_event &lt;- did_data_event %&gt;%
  mutate(time_to_treat = if_else(treat_group == 0, -1000, time_to_treat))

# Run the event study regression using fixest
# We use i(time_to_treat, ref = c(-1, -1000)) to use t-1 and never-treated as reference
es_model &lt;- feols(conflict ~ i(time_to_treat, treat_group, ref = c(-1, -1000)) | ccode + year,
                  data = did_data_event, cluster = ~ccode)
```

---


``` r
# Create the plot
iplot(es_model,
      xlab = 'Years Relative to Democratization',
      main = 'Effect of Democratization on Conflict Initiation')
```

![](didkickoff_files/figure-html/unnamed-chunk-10-1.png)&lt;!-- --&gt;

---

## What to Look For

*   **Pre‑treatment coefficients** (left of 0) should be close to zero and statistically insignificant. This suggests no pre-existing differences in trends.
*   **Post‑treatment coefficients** (right of 0) will show the dynamic effect over time. Do they become significant? Do they grow or fade?

If the pre‑treatment coefficients are not flat around zero, the parallel trends assumption is suspect.

---

## A Modern Concern: Staggered Treatment and the Bacon Decomposition

In our design, countries democratize at different times. This is a **staggered treatment** design. Recent research (e.g., Goodman-Bacon 2021) shows that the standard TWFE estimator in this setting can be biased if treatment effects vary over time or across cohorts.

The `bacondecomp` package can help you diagnose this problem.

---


``` r
# You may need to install this package first:
# install.packages("bacondecomp")
 library(bacondecomp)

# Identify countries with complete observations over the entire period
balanced_countries &lt;- did_data_clean %&gt;%
  group_by(ccode) %&gt;%
  summarise(n_years = n(), .groups = "drop") %&gt;%
  filter(n_years == length(1945:2010)) %&gt;%
  pull(ccode)

did_data_balanced &lt;- did_data_clean %&gt;%
  filter(ccode %in% balanced_countries)

# Then run bacon on the balanced panel
library(bacondecomp)
df_bacon &lt;- bacon(conflict ~ treat_post,
                  data = did_data_balanced,
                  id_var = "ccode",
                  time_var = "year")
```

---

&gt; **For your analysis:** If you have staggered treatment, consider using the modern DiD estimators from packages like `did` (Callaway &amp; Sant'Anna) or `fect` (Liu et al.). We've linked to tutorials on these in the session notes.

#  Wrap‑Up
### Cheat Sheet for Difference‑in‑Differences

---

| Design | Identification Strategy | Data Requirements | Key Assumption |
| :----- | :---------------------- | :---------------- | :------------- |
| **Difference‑in‑Differences (DiD)** | Compares the change over time in a treated group to the change in an untreated group. | Panel data (treated &amp; control units, before &amp; after periods). | **Parallel Trends:** In the absence of treatment, the average outcome would have changed the same way for both groups. |
| **Staggered DiD / Event Study** | Uses variation in treatment timing across units. | Panel data with units treated at different times. | Parallel trends, plus a correctly specified model that accounts for treatment effect heterogeneity. |


&gt; **Single most important rule for DiD:** Always visually inspect pre‑treatment trends with an event study plot. If the lines aren't parallel before treatment, your results are likely biased.
